# TLS: mount /etc/letsencrypt and /var/www/certbot (see docker-compose.yml).
#
# Issue cert on the VPS:
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d yourenhancedlife.com -d www.yourenhancedlife.com
#
# Maintenance: touch deploy/maintenance/on then reload nginx
#   sh deploy/toggle-maintenance.sh

resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream yel_django {
    server backend:8000;
    keepalive 16;
}

# --- Production HTTPS ---
server {
    listen 443 ssl;
    http2 on;
    server_name yourenhancedlife.com www.yourenhancedlife.com;

    recursive_error_pages on;

    ssl_certificate     /etc/letsencrypt/live/yourenhancedlife.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourenhancedlife.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25m;
    open_file_cache off;

    error_page 503 =503 @yel_maintenance;
    location @yel_maintenance {
        default_type text/html;
        charset utf-8;
        root /var;
        try_files /maintenance/maintenance.html /defaults/maintenance.html =404;
        add_header Retry-After 600 always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # Django health (Compose / monitoring). Other /api/* is handled by Next.js rewrites + BFF.
    location = /api/health {
        proxy_pass http://yel_django;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded media (blog thumbnails, branding logos, etc.) — served from host ./data/media
    location /media/ {
        alias /var/www/yel-media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Static article images (manual /images/... paths) — served from host ./public/images
    location /images/ {
        alias /var/www/yel-images/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Django admin (optional direct access)
    location /admin/ {
        set $yel_maint "";
        if (-f /var/maintenance/on) {
            set $yel_maint "${yel_maint}1";
        }
        if ($yel_maint = "1") {
            return 503;
        }
        proxy_pass http://yel_django;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js — site, dashboard, /api/dashboard BFF, and Next rewrites to Django
    location / {
        set $yel_maint "";
        if (-f /var/maintenance/on) {
            set $yel_maint "${yel_maint}1";
        }
        if ($yel_maint = "1") {
            return 503;
        }
        set $yel_next http://frontend:3000;
        proxy_pass $yel_next;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
    }
}

# --- HTTP → HTTPS + ACME ---
server {
    listen 80;
    server_name yourenhancedlife.com www.yourenhancedlife.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
